name: Build macOS DMG

on:
  push:
    tags:
      - 'v*'          # déclenche sur les tags de version : v1.0.0, v1.1.0…
  workflow_dispatch:  # ou manuellement depuis l'onglet Actions sur GitHub

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build DMG universel (Apple Silicon + Intel)
        run: npx electron-builder --mac --universal --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false   # pas de signature Apple requise

      - name: Upload DMG (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Proxy-VIKTA-mac
          path: dist/*.dmg
          if-no-files-found: error
          retention-days: 30

      - name: Créer une GitHub Release (sur tag v*)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
